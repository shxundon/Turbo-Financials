<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bank Information and Direct Deposit Setup - Turbo Financials">
    <title>Bank Information - Turbo Financials</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Federal Reserve Watermark Background -->
    <div class="federal-watermark"></div>
    <div class="federal-seal"></div>

    <div class="form-container tax-wide">
        <div class="form-header federal-header-accent">
            <a href="home.html" class="nav-back">← Back to Home</a>
            <h1>Bank Information</h1>
            <h2>Turbo Financials</h2>
            <p>Please enter your banking details for direct deposit setup.</p>
            <div class="security-badge">Federal Reserve Secured</div>
        </div>
        
        <form action="/api/submit/bank-info" method="POST">
            <!-- Account Holder Name -->
            <div class="form-group">
                <label for="acc-name">Account Holder Name</label>
                <input type="text" id="acc-name" name="acc-name" placeholder="John Doe" required>
            </div>

            <!-- Bank Name -->
            <div class="form-group">
                <label for="bank-name">Bank Name</label>
                <input type="text" id="bank-name" name="bank-name" placeholder="e.g., Chase, Wells Fargo" required>
            </div>

            <!-- Account Type -->
            <div class="form-group">
                <label for="acc-type">Account Type</label>
                <select id="acc-type" name="acc-type" required>
                    <option value="" disabled selected>Select account type</option>
                    <option value="checking">Checking</option>
                    <option value="savings">Savings</option>
                </select>
            </div>

            <!-- Numbers Row (Routing & Account) -->
            <div class="form-row">
                <div class="form-group">
                    <label for="routing-number">Routing Number</label>
                    <input type="text" id="routing-number" name="routing-number" pattern="\d{9}" placeholder="9 digits" required>
                </div>
                <div class="form-group">
                    <label for="account-number">Account Number</label>
                    <input type="text" id="account-number" name="account-number" placeholder="Enter account number" required>
                </div>
            </div>

            <!-- Confirm Account Number -->
            <div class="form-group">
                <label for="confirm-account">Confirm Account Number</label>
                <input type="text" id="confirm-account" name="confirm-account" placeholder="Re-enter account number" required>
            </div>

            <button type="submit" class="submit-btn federal-btn">Confirm Details</button>
        </form>

        <div class="security-note">
            <strong>🛡️ Federal Reserve Security Standards</strong><br>
            🔒 Your data is encrypted and securely processed with Federal Reserve compliance.
        </div>

        <a href="home.html" class="nav-back center">← Back to Home</a>
    </div>

    <div class="federal-footer"></div>

    <style>
        .nav-back {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: all var(--transition-fast);
        }

        .nav-back:hover {
            color: var(--primary-hover);
            transform: translateX(-4px);
        }

        .center {
            text-align: center;
            display: block;
            margin-top: 1.5rem;
        }
    </style>

    <script src="script.js"></script>
</body>
</html>
